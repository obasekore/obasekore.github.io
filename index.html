<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hammed Obasekore | Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #050505; color: white; }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #00ffcc; }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 300; }
        #description { position: absolute; bottom: 20px; left: 20px; max-width: 300px; font-size: 0.9rem; opacity: 0.7; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@v0.155.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@v0.155.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div class="label">Researcher & AI Developer</div>
        <h1>HAMMED OBASEKORE, PhD</h1>
    </div>
    
    <div id="description">
        Click a node to explore: <br>
        • Deep Reinforcement Learning <br>
        • Robot Smart Systems <br>
        • Sim-to-Real Optimization
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, raycaster, mouse;
        const nodes = [];

        init();
        animate();

        function init() {
            // SCENE & CAMERA
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x050505, 10, 50);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);

            // RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // CONTROLS
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // LIGHTING
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x00ffcc, 2, 50);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // SIMULATION GRID (Visualizing your Robotics/Sim background)
            const grid = new THREE.GridHelper(100, 100, 0x222222, 0x111111);
            scene.add(grid);

            // INTERACTIVE NODES (Representing key skills/publications)
            const nodeData = [
                { name: "Research", color: 0x00ffcc, pos: [-3, 2, 0], link: "https://scholar.google.com/citations?user=lGBnaQ4AAAAJ" },
                { name: "Dev/GitHub", color: 0xff00ff, pos: [2, 3], link: "https://github.com/yourusername" },
                { name: "PhD Project", color: 0xffff00, pos: [0, 4, -2], link: "#" }
            ];

            nodeData.forEach(data => {
                const geo = new THREE.SphereGeometry(0.5, 32, 32);
                const mat = new THREE.MeshPhongMaterial({ 
                    color: data.color, 
                    emissive: data.color, 
                    emissiveIntensity: 0.5,
                    shininess: 100 
                });
                const sphere = new THREE.Mesh(geo, mat);
                sphere.position.set(...data.pos);
                sphere.userData = { link: data.link, name: data.name };
                scene.add(sphere);
                nodes.push(sphere);
            });

            // RAYCASTER FOR INTERACTIVITY
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('click', onDocumentMouseDown);
            window.addEventListener('resize', onWindowResize);
        }

        function onDocumentMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);

            if (intersects.length > 0) {
                const object = intersects.object;
                console.log("Navigating to: " + object.userData.name);
                if(object.userData.link !== "#") window.open(object.userData.link, '_blank');
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle floating animation for nodes
            nodes.forEach((node, i) => {
                node.position.y += Math.sin(Date.now() * 0.001 + i) * 0.005;
            });

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
